name: Deploy Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build showcase app
        run: npm run build:showcase:pages

      - name: Build Storybook
        run: npm run build-storybook

      - name: Build Compodoc
        run: npm run compodoc:ci

      - name: Assemble GitHub Pages site
        run: |
          mkdir -p public

          if [ -d dist/showcase/browser ]; then
            cp -R dist/showcase/browser public/showcase
          elif [ -d dist/showcase ]; then
            cp -R dist/showcase public/showcase
          else
            echo "Could not find showcase build output in dist/showcase"
            exit 1
          fi

          cp -R storybook-static public/storybook
          cp -R dist/compodoc/ui-sdk public/compodoc

          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>UI SDK Docs</title>
              <link rel="preconnect" href="https://fonts.googleapis.com" />
              <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
              <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet" />
              <style>
                :root {
                  --bg: #f7f7f7;
                  --ink: #001844;
                  --muted: #34526f;
                  --card: #ffffff;
                  --line: #adafb2;
                  --brand-a: #00338e;
                  --brand-b: #009ee4;
                  --shadow: 0 16px 44px rgba(0, 24, 68, 0.16);
                }

                * {
                  box-sizing: border-box;
                }

                body {
                  margin: 0;
                  min-height: 100vh;
                  font-family: "Space Grotesk", "Segoe UI", sans-serif;
                  color: var(--ink);
                  background:
                    radial-gradient(circle at 0% 0%, #dce9ff 0%, transparent 30%),
                    radial-gradient(circle at 92% 92%, #d6efff 0%, transparent 34%),
                    var(--bg);
                }

                .shell {
                  width: min(960px, calc(100% - 2rem));
                  margin: 2rem auto;
                  border: 1px solid var(--line);
                  border-radius: 22px;
                  background: rgba(255, 255, 255, 0.88);
                  backdrop-filter: blur(8px);
                  box-shadow: var(--shadow);
                  overflow: hidden;
                  animation: rise 500ms ease-out both;
                }

                .hero {
                  padding: 2rem clamp(1rem, 3vw, 2rem);
                  border-bottom: 1px solid var(--line);
                }

                .eyebrow {
                  margin: 0;
                  letter-spacing: 0.12em;
                  text-transform: uppercase;
                  font-weight: 700;
                  font-size: 0.72rem;
                  color: var(--brand-a);
                }

                h1 {
                  margin: 0.6rem 0 0;
                  font: 600 clamp(2rem, 3.2vw, 3rem) / 1.1 "Fraunces", serif;
                }

                .sub {
                  margin: 0.8rem 0 0;
                  max-width: 64ch;
                  color: var(--muted);
                }

                .grid {
                  display: grid;
                  grid-template-columns: repeat(3, minmax(0, 1fr));
                  gap: 0.9rem;
                  padding: 1rem;
                }

                .card {
                  display: block;
                  text-decoration: none;
                  color: inherit;
                  border: 1px solid var(--line);
                  border-radius: 16px;
                  padding: 1rem;
                  background: var(--card);
                  transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
                }

                .card:hover,
                .card:focus-visible {
                  transform: translateY(-3px);
                  box-shadow: 0 10px 22px rgba(17, 32, 43, 0.14);
                  border-color: var(--brand-b);
                  outline: none;
                }

                .tag {
                  display: inline-block;
                  font-size: 0.7rem;
                  line-height: 1;
                  letter-spacing: 0.1em;
                  text-transform: uppercase;
                  border-radius: 999px;
                  padding: 0.42rem 0.55rem;
                  margin-bottom: 0.65rem;
                  color: #ffffff;
                  background: linear-gradient(135deg, var(--brand-a), var(--brand-b));
                }

                .title {
                  margin: 0;
                  font-size: 1.05rem;
                  font-weight: 700;
                }

                .desc {
                  margin: 0.45rem 0 0;
                  font-size: 0.9rem;
                  color: var(--muted);
                }

                @keyframes rise {
                  from {
                    opacity: 0;
                    transform: translateY(12px);
                  }
                  to {
                    opacity: 1;
                    transform: translateY(0);
                  }
                }

                @media (max-width: 820px) {
                  .grid {
                    grid-template-columns: 1fr;
                  }
                }
              </style>
            </head>
            <body>
              <main class="shell">
                <header class="hero">
                  <p class="eyebrow">Design System Portal</p>
                  <h1>UI SDK Pages</h1>
                  <p class="sub">Everything published from this repo in one place. Open the live showcase, browse Storybook states, or inspect API docs in Compodoc.</p>
                </header>
                <section class="grid" aria-label="Published artifacts">
                  <a class="card" href="./showcase/">
                    <span class="tag">App</span>
                    <p class="title">Showcase</p>
                    <p class="desc">Interactive Angular app built from the SDK library package.</p>
                  </a>
                  <a class="card" href="./storybook/">
                    <span class="tag">Components</span>
                    <p class="title">Storybook</p>
                    <p class="desc">Visual catalog with stories, controls, and usage examples.</p>
                  </a>
                  <a class="card" href="./compodoc/">
                    <span class="tag">Docs</span>
                    <p class="title">Compodoc</p>
                    <p class="desc">Generated API reference and source relationships.</p>
                  </a>
                </section>
              </main>
            </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
